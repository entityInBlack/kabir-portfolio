<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Posts — Kabir</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .post-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .post-row:last-child { border-bottom: none; }
    .post-info h3 {
      font-family: 'Playfair Display', serif;
      color: var(--white);
      font-size: 1.1rem;
      margin: 0 0 0.4rem 0;
    }
    .post-meta {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
    }
    .badge-type, .badge-status {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding: 0.25rem 0.6rem;
      border-radius: 4px;
    }
    .badge-type.project { background: rgba(212,175,55,0.15); color: var(--gold); }
    .badge-type.blog { background: rgba(90,150,220,0.15); color: #6fa8dc; }
    .badge-status.published { background: rgba(80,180,100,0.15); color: #6fcf7d; }
    .badge-status.draft { background: rgba(255,255,255,0.08); color: var(--gray); }
    .post-date {
      color: var(--gray);
      font-size: 0.82rem;
    }
    .post-actions button {
      background: none;
      border: 1px solid rgba(255,255,255,0.15);
      color: var(--gray);
      font-size: 0.78rem;
      padding: 0.4rem 0.9rem;
      border-radius: 4px;
      margin-left: 0.5rem;
      cursor: not-allowed;
      opacity: 0.5;
    }
    .empty-state, .loading-state {
      text-align: center;
      color: var(--gray);
      padding: 2.5rem 1rem;
    }
  </style>
</head>
<body>

  <!-- ===================== NAVBAR ===================== -->
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="../index.html">Kabir</a>
    </div>
  </nav>

  <main>

    <!-- ===================== PAGE TITLE ===================== -->
    <section class="page-title-section">
      <div class="container">
        <h1 class="section-title fade-up fade-up-1">Manage Posts</h1>
        <p class="fade-up fade-up-2">Projects and blog entries — create, review, and manage content.</p>
        <p class="breadcrumb-nav fade-up fade-up-3">
          <a href="../index.html">Home</a> &nbsp;/&nbsp;
          <a href="dashboard.html">Admin Dashboard</a> &nbsp;/&nbsp; Manage Posts
        </p>
      </div>
    </section>

    <!-- ===================== POSTS LIST ===================== -->
    <section class="contact-form-section">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-lg-9">

            <div class="d-flex justify-content-end mb-3">
              <a href="post-editor.html" class="btn-outline" style="text-decoration:none; display:inline-block;">
                + New Post
              </a>
            </div>

            <div id="loadingState" class="service-card loading-state">
              <p style="margin:0;">Checking session...</p>
            </div>

            <div id="postsCard" class="service-card" style="padding:0; display:none;">
              <div id="postsList"></div>
              <div id="emptyState" class="empty-state" style="display:none;">
                <p style="margin:0;">No posts yet. Create your first one to get started.</p>
              </div>
            </div>

          </div>
        </div>
      </div>
    </section>

  </main>

  <!-- ===================== FOOTER ===================== -->
  <footer class="footer text-white">
    <div class="container-fluid">
      <div class="row align-items-center">
        <div class="col-12 text-center">
          <p class="mb-0">&copy; 2025 Kabir. All rights reserved. &nbsp;|&nbsp;
            <span id="live-clock" style="color:var(--gold);"></span>
          </p>
        </div>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/admin-common.js"></script>
  <script>
    // Live clock (reused from login.html / dashboard.html pattern)
    function updateClock() {
      const el = document.getElementById('live-clock');
      if (el) el.textContent = new Date().toLocaleTimeString();
    }
    setInterval(updateClock, 1000);
    updateClock();

    const loadingState = document.getElementById('loadingState');
    const postsCard = document.getElementById('postsCard');
    const postsList = document.getElementById('postsList');
    const emptyState = document.getElementById('emptyState');

    function formatDate(dateStr) {
      const d = new Date(dateStr);
      return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
    }

    function renderPosts(posts) {
      loadingState.style.display = 'none';
      postsCard.style.display = 'block';

      if (!posts || posts.length === 0) {
        emptyState.style.display = 'block';
        return;
      }

      postsList.innerHTML = posts.map(function (post) {
        const typeClass = post.type === 'blog' ? 'blog' : 'project';
        const statusClass = post.published ? 'published' : 'draft';
        const statusLabel = post.published ? 'Published' : 'Draft';

        return (
          '<div class="post-row">' +
            '<div class="post-info">' +
              '<h3>' + post.title + '</h3>' +
              '<div class="post-meta">' +
                '<span class="badge-type ' + typeClass + '">' + post.type + '</span>' +
                '<span class="badge-status ' + statusClass + '">' + statusLabel + '</span>' +
                '<span class="post-date">' + formatDate(post.createdAt) + '</span>' +
              '</div>' +
            '</div>' +
            '<div class="post-actions">' +
              '<button type="button" disabled title="Coming soon">Edit</button>' +
              '<button type="button" disabled title="Coming soon">Delete</button>' +
            '</div>' +
          '</div>'
        );
      }).join('');
    }

    // ===================== AUTH CHECK + LOAD POSTS =====================
    checkAdminAuth(function () {
      const token = localStorage.getItem('adminToken');

      fetch('/api/posts/list', {
        method: 'GET',
        headers: { 'Authorization': 'Bearer ' + token }
      })
        .then(function (res) { return res.json(); })
        .then(function (data) {
          renderPosts(data.posts);
        })
        .catch(function () {
          loadingState.innerHTML = '<p style="margin:0;">Failed to load posts. Please refresh.</p>';
        });
    });
  </script>
</body>
</html>
